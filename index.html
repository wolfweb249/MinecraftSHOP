<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MC-ULTIMATE POS PRO MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --mc-green: #00ff41;
            --mc-bg: #0d0d0d;
            --mc-panel: #1a1a1a;
        }

        body {
            background-color: var(--mc-bg);
            color: var(--mc-green);
            font-family: 'JetBrains+Mono', 'DotGothic16', monospace;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        #itemGridContainer {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 280px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .item-card {
            background: var(--mc-panel);
            border: 1px solid #333;
            position: relative;
            transition: all 0.1s;
        }

        .item-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff4100;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 99px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .tab-btn {
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            border-color: var(--mc-green);
            color: white;
            background: rgba(0, 255, 65, 0.1);
        }

        .bottom-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-blur: 15px;
            border-top: 2px solid rgba(0, 255, 65, 0.4);
            z-index: 100;
        }

        .control-btn {
            touch-action: manipulation;
            transition: opacity 0.1s, transform 0.05s;
        }
        .control-btn:active {
            opacity: 0.6;
            transform: scale(0.95);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }

        .receipt-paper {
            background: #fdfdfd;
            color: #1a1a1a;
            width: 100%;
            max-width: 350px;
            padding: 25px;
            font-family: 'DotGothic16', sans-serif;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            position: relative;
        }

        .receipt-paper::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 10px;
            background: linear-gradient(-45deg, transparent 5px, #fdfdfd 0), linear-gradient(45deg, transparent 5px, #fdfdfd 0);
            background-size: 10px 10px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 border-b border-white/10 flex justify-between items-center bg-black">
        <h1 class="text-xl font-bold tracking-widest text-white">MC-POS <span class="text-green-500 text-xs italic">ULTIMATE</span></h1>
        <div id="clock" class="text-xs font-mono opacity-70">00:00:00</div>
    </header>

    <!-- Search & Tabs -->
    <div class="p-2 space-y-2 bg-black/60 border-b border-white/5">
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="アイテム検索..." 
               class="w-full bg-white/5 border border-white/10 p-3 rounded-lg text-sm focus:border-green-500 outline-none text-green-400">
        
        <div id="tabs" class="flex gap-2 overflow-x-auto no-scrollbar py-1"></div>
    </div>

    <!-- Main Grid -->
    <div id="itemGridContainer">
        <main id="itemGrid" class="p-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></main>
    </div>

    <!-- Bottom Panel -->
    <div class="bottom-panel p-4 shadow-2xl">
        <div id="cartDrawer" class="hidden mb-4 max-h-40 overflow-y-auto no-scrollbar border-b border-white/10 pb-3 space-y-2"></div>

        <div class="flex justify-between items-end mb-4">
            <div onclick="toggleCart()" class="cursor-pointer">
                <div class="text-[10px] uppercase opacity-50 flex items-center gap-1">
                    合計点数 <span id="cartCount" class="bg-green-500 text-black px-2 rounded ml-1 font-bold font-mono text-xs">0</span>
                </div>
                <div id="displayTotal" class="text-4xl font-bold text-white tracking-tighter">0<span class="text-sm ml-1 text-green-500">円</span></div>
            </div>
            <div class="text-right">
                <div id="displayStack" class="text-xs text-green-400 font-mono font-bold">0枚 (0s + 0)</div>
                <div id="displayShulker" class="text-[10px] text-yellow-500 font-bold hidden">0.00 Boxes</div>
            </div>
        </div>

        <div class="flex gap-2">
            <button onclick="showReceiptModal()" class="flex-1 h-14 bg-green-500 text-black font-black rounded-xl uppercase tracking-widest active:bg-green-400 text-sm">
                レシートを表示
            </button>
            <button onclick="clearCart()" class="w-14 h-14 border border-red-900 text-red-500 rounded-xl flex items-center justify-center font-bold active:bg-red-900/20">
                CLR
            </button>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal-overlay hidden" onclick="hideReceiptModal()">
        <div class="receipt-paper" onclick="event.stopPropagation()">
            <div class="text-center border-b-2 border-dashed border-gray-400 pb-4 mb-4">
                <h2 class="text-2xl font-black">領収書 / RECEIPT</h2>
                <p class="text-[10px] opacity-60 mt-1" id="receiptDate"></p>
            </div>
            <div id="receiptItems" class="space-y-1 mb-6 min-h-[100px] max-h-[300px] overflow-y-auto text-sm"></div>
            <div class="border-t-2 border-gray-400 pt-4 space-y-1">
                <div class="flex justify-between font-bold text-lg">
                    <span>総合計</span>
                    <span id="modalTotal">0円</span>
                </div>
                <div class="text-[12px] flex justify-between">
                    <span>スタック数</span>
                    <span id="modalStack">0s + 0</span>
                </div>
                <p class="text-[10px] text-gray-500 mt-4 text-center italic">Thank you for your business!</p>
            </div>
            <div class="mt-6 flex gap-2">
                <button onclick="copyReceipt()" class="flex-1 bg-gray-900 text-white py-3 rounded font-bold text-sm">コピー</button>
                <button onclick="hideReceiptModal()" class="flex-1 bg-red-600 text-white py-3 rounded font-bold text-sm">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        const ALL_ITEMS = [
            { n: "石", p: 1, c: "建築" }, { n: "丸石", p: 1, c: "建築" }, { n: "滑らかな石", p: 2, c: "建築" },
            { n: "石レンガ", p: 2, c: "建築" }, { n: "土", p: 1, c: "建築" }, { n: "砂", p: 2, c: "建築" },
            { n: "ガラス", p: 2, c: "建築" }, { n: "氷塊", p: 10, c: "建築" }, { n: "青氷", p: 40, c: "建築" },
            { n: "クォーツブロック", p: 15, c: "建築" }, { n: "テラコッタ", p: 4, c: "建築" },
            { n: "オークの原木", p: 2, c: "木材" }, { n: "トウヒの原木", p: 2, c: "木材" }, { n: "桜の原木", p: 2, c: "木材" },
            { n: "トウヒのトラップドア", p: 3, c: "装飾" }, { n: "チェスト", p: 4, c: "装飾" },
            { n: "エンダーチェスト", p: 200, c: "装飾" }, { n: "ランタン", p: 12, c: "装飾" },
            { n: "RSダスト", p: 2, c: "RS" }, { n: "リピーター", p: 10, c: "RS" }, { n: "粘着ピストン", p: 35, c: "RS" },
            { n: "ホッパー", p: 60, c: "RS" }, { n: "TNT", p: 50, c: "RS" },
            { n: "ダイヤのツルハシ", p: 300, c: "ツール" }, { n: "エリトラ", p: 3000, c: "ツール" },
            { n: "ロケット花火", p: 5, c: "ツール" }, { n: "不死のトーテム", p: 800, c: "ツール" },
            { n: "パン", p: 3, c: "食料" }, { n: "ステーキ", p: 8, c: "食料" }, { n: "金の人参", p: 25, c: "食料" },
            { n: "ダイヤモンド", p: 100, c: "貴重品" }, { n: "鉄インゴット", p: 10, c: "貴重品" },
            { n: "エメラルド", p: 20, c: "貴重品" }, { n: "ネザースター", p: 1728, c: "貴重品" }
        ];

        let cart = {}; 
        const CATEGORIES = ["すべて", "建築", "木材", "装飾", "RS", "ツール", "食料", "貴重品"];
        let currentCategory = "すべて";
        const STACK = 64;

        window.onload = () => {
            renderTabs();
            renderItems(ALL_ITEMS);
            setInterval(updateClock, 1000);
            updateClock();
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ja-JP', {hour12: false});
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.innerHTML = CATEGORIES.map(cat => `
                <button onclick="selectCategory('${cat}')" class="tab-btn px-4 py-2 text-xs font-bold ${currentCategory === cat ? 'active' : 'opacity-50'}">
                    ${cat}
                </button>
            `).join('');
        }

        function selectCategory(cat) {
            currentCategory = cat;
            renderTabs();
            handleSearch();
            document.getElementById('itemGridContainer').scrollTop = 0;
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = ALL_ITEMS;
            if (currentCategory !== "すべて") filtered = filtered.filter(i => i.c === currentCategory);
            if (query) filtered = filtered.filter(i => i.n.toLowerCase().includes(query));
            renderItems(filtered);
        }

        function renderItems(items) {
            const grid = document.getElementById('itemGrid');
            grid.innerHTML = items.map(item => {
                const count = cart[item.n] ? cart[item.n].qty : 0;
                const badge = count > 0 ? `<div class="item-badge">${count}</div>` : "";
                const isNoItem = count === 0;
                
                return `
                    <div class="item-card p-3 rounded-xl flex flex-col justify-between h-48 shadow-lg">
                        ${badge}
                        <div>
                            <div class="text-[7px] opacity-40 uppercase tracking-widest mb-1">${item.c}</div>
                            <div class="text-[12px] font-bold text-white leading-tight line-clamp-2">${item.n}</div>
                            <div class="text-green-400 text-[10px] font-bold font-mono mt-1">${item.p}円/個</div>
                        </div>
                        <div class="space-y-1.5 mt-2">
                            <div class="flex gap-1.5">
                                <button onclick="changeQty('${item.n}', -1, ${item.p})" class="control-btn flex-1 h-9 bg-white/5 border border-white/10 rounded flex items-center justify-center text-white font-black text-xs ${isNoItem ? 'opacity-10' : ''}">-1</button>
                                <button onclick="changeQty('${item.n}', 1, ${item.p})" class="control-btn flex-1 h-9 bg-green-500/10 border border-green-500/50 rounded flex items-center justify-center text-green-400 font-black text-xs">+1</button>
                            </div>
                            <div class="flex gap-1.5">
                                <button onclick="changeQty('${item.n}', -64, ${item.p})" class="control-btn flex-1 h-9 bg-red-900/30 border border-red-900/50 rounded flex items-center justify-center text-red-500 font-black text-[10px] ${isNoItem ? 'opacity-10' : ''}">-64</button>
                                <button onclick="changeQty('${item.n}', 64, ${item.p})" class="control-btn flex-1 h-9 bg-green-500 rounded flex items-center justify-center text-black font-black text-[10px]">+64</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeQty(name, delta, price) {
            if (cart[name]) {
                cart[name].qty += delta;
                if (cart[name].qty <= 0) delete cart[name];
            } else if (delta > 0) {
                cart[name] = { price, qty: delta };
            }
            updateUI();
            handleSearch();
        }

        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('hidden');
        }

        function updateUI() {
            const drawer = document.getElementById('cartDrawer');
            drawer.innerHTML = "";
            let subtotal = 0;
            let totalCount = 0;

            Object.keys(cart).sort().forEach(name => {
                const item = cart[name];
                subtotal += item.price * item.qty;
                totalCount += item.qty;
                
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white/5 p-2 rounded text-[11px]";
                div.innerHTML = `<span>${name} x${item.qty}</span><span class="text-green-400 font-mono font-bold">${(item.price * item.qty).toLocaleString()}円</span>`;
                drawer.appendChild(div);
            });

            document.getElementById('cartCount').innerText = totalCount;
            const grandTotal = Math.ceil(subtotal * 1.1);
            document.getElementById('displayTotal').innerHTML = `${grandTotal.toLocaleString()}<span class="text-sm ml-1 text-green-500">円</span>`;
            
            const ts = Math.floor(grandTotal / STACK);
            const tr = grandTotal % STACK;
            document.getElementById('displayStack').innerText = `${grandTotal}枚 (${ts}s + ${tr})`;
        }

        function showReceiptModal() {
            if (Object.keys(cart).length === 0) return;
            const container = document.getElementById('receiptItems');
            const now = new Date();
            document.getElementById('receiptDate').innerText = now.toLocaleString();
            
            container.innerHTML = "";
            let subtotal = 0;
            Object.keys(cart).sort().forEach(name => {
                const item = cart[name];
                const total = item.price * item.qty;
                subtotal += total;
                const s = Math.floor(item.qty / STACK);
                const r = item.qty % STACK;
                
                container.innerHTML += `
                    <div class="flex justify-between border-b border-gray-100 py-2">
                        <div>
                            <div class="font-bold">${name}</div>
                            <div class="text-[10px] opacity-60">数量: ${item.qty} (${s}s + ${r})</div>
                        </div>
                        <div class="font-mono font-bold text-right">${total.toLocaleString()}円</div>
                    </div>`;
            });

            const grandTotal = Math.ceil(subtotal * 1.1);
            const ts = Math.floor(grandTotal / STACK);
            const tr = grandTotal % STACK;
            
            document.getElementById('modalTotal').innerText = grandTotal.toLocaleString() + "円";
            document.getElementById('modalStack').innerText = `${ts}s + ${tr}`;
            document.getElementById('receiptModal').classList.remove('hidden');
        }

        function hideReceiptModal() {
            document.getElementById('receiptModal').classList.add('hidden');
        }

        function clearCart() {
            // alertの代わりに内製UIが良いが、簡易的に実装
            if (Object.keys(cart).length > 0) {
                cart = {};
                updateUI();
                handleSearch();
            }
        }

        function copyReceipt() {
            const keys = Object.keys(cart);
            let subtotal = 0;
            let text = "### **領収書 / MC-RECEIPT**\n\n";

            keys.sort().forEach(name => {
                const item = cart[name];
                const total = item.price * item.qty;
                subtotal += total;
                const s = Math.floor(item.qty / STACK);
                const r = item.qty % STACK;
                text += `* **${name}** (×${item.qty}点 / ${s}s+${r}) … ${total.toLocaleString()}円\n`;
            });

            const grandTotal = Math.ceil(subtotal * 1.1);
            const ts = Math.floor(grandTotal / STACK);
            const tr = grandTotal % STACK;

            text += "\n-------------------------------\n";
            text += `**総合計： ${grandTotal.toLocaleString()}円**\n`;
            text += `（内訳： **${ts}スタック ＋ ${tr}枚**）\n`;

            navigator.clipboard.writeText(text).then(() => {
                const modal = document.createElement('div');
                modal.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-green-500 text-black px-6 py-2 rounded-full font-bold z-[300]";
                modal.innerText = "COPIED!";
                document.body.appendChild(modal);
                setTimeout(() => modal.remove(), 2000);
            });
        }
    </script>
</body>
</html>
